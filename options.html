<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>DSA Logger Settings</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container wide">
      <h2>Storage Settings</h2>

      <div class="field">
        <label>Default Save Target</label>
        <select id="storageTarget">
          <option value="googleSheets">Google Sheets</option>
          <option value="notion">Notion</option>
        </select>
      </div>

      <hr />

      <h3>Google Sheets</h3>
      <div class="field">
        <label>Google Apps Script Web App URL</label>
        <input id="googleScriptUrl" type="url" placeholder="https://script.google.com/macros/s/.../exec" />
      </div>

      <hr />

      <h3>Notion</h3>
      <div class="field">
        <label>Notion Integration Token</label>
        <input id="notionToken" type="password" placeholder="secret_..." />
      </div>

      <div class="field">
        <label>Notion Database ID</label>
        <input id="notionDatabaseId" type="text" placeholder="xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx" />
      </div>

      <button id="saveSettings">Save Settings</button>
      <p id="settingsStatus"></p>
    </div>

    <script src="options.js"></script>
  </body>
</html>
